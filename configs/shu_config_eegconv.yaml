group:
log_metrics: True

data:
  type: lmdb
  train: [1, 16]
  valid: [16, 21]
  test: [21, 26]
  sampling_freq: 250
  target_freq: 70
  datadir: mat
  db_dir: data/shu/processed_eeg_70hz

model:
  arch: eeg_conv
  fm: 109
  n_convs: 4
  kernel_size: 8
  n_chan: 32
  n_classes: 2

train:
  bsz: 64
  num_epochs: 50
  lr: 1e-3
  lr_backbone: 1e-4
  weight_decay: 5e-2
  grad_clipping: 1

eval:
  bsz: 128
